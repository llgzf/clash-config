[custom]
; ==========================================================
; 2026-07-17 电视盒子+旁路由环境深度优化版
; 彻底杜绝 Loop、完美支持内网 NAS 穿透、修复 TLS 指纹闪退
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; 移除旧版/废弃的 TLS 指纹参数，防止 2026 最新内核闪退崩溃
global-client-fingerprint=null

; 节点清洗（排除无用节点和广告宣传）
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ==========================================================
; 1) 规则定义 (Rules) - 严格顺序：直连 > 分流 > 兜底
; ==========================================================

; --- 1. 基础直连与内网穿透 (确保电视盒子丝滑访问飞牛 NAS 和主路由) ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,lan,no-resolve
; 强制将局域网段直连（防止旁路由环境下的网关环路）
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 2. 核心视频与电视分流 (针对 YouTube 和电视盒子进行优化) ---
ruleset=🎬 视频与电视,[]DOMAIN-SUFFIX,886776.com
ruleset=🎬 视频与电视,[]DOMAIN-SUFFIX,886777.com
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,littlecloud
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,cloudtv
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,youtube
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,googlevideo
ruleset=🤖 ChatGPT,[]DOMAIN-KEYWORD,openai

; --- 3. 最终兜底 ---
ruleset=🚀 节点选择,[]GEOSITE,gfw
ruleset=🚀 节点选择,[]FINAL

; ==========================================================
; 2) 策略组定义 (去国家嵌套，逻辑清晰，无 Loop)
; ==========================================================

; --- 【顶层总控制组】 🚀 节点选择 ---
; 作为全局和 GFW 的兜底控制台，不被任何下游组引用，不产生 Loop 
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT

; --- 【应用分流组】 ---
; 电视盒子看 YouTube 直接调用底层的物理节点或直连，不再回引顶层组
custom_proxy_group=🎬 视频与电视`select`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🤖 ChatGPT`select`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT

; ==========================================================
; 3) 物理节点过滤与自动测速 (使用正则精准匹配，不把策略组当成节点)
; ==========================================================

; 🧭 手动选择：利用匹配规则，仅筛选真正的物理节点，排除包含特殊字符的“策略组”
custom_proxy_group=🧭 手动选择`select`^(?!.*(🚀|🎬|🤖|♻️|🧭|DIRECT|REJECT|物理节点池)).*

; ♻️ 自动选择：从手动选择的物理节点池中进行延迟测试，测速地址使用 2026 稳定 CDN
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*(🚀|🎬|🤖|♻️|🧭|DIRECT|REJECT|物理节点池)).*`https://cp.cloudflare.com/generate_204`300,,50
