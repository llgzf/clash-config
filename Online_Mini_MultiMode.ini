[custom]
; ==========================================================
; 2026-07-17 最终完美优化版：电视盒子 + 飞牛 NAS 旁路由
; 彻底解决指纹闪退、注入 Fake-IP、强制关闭 IPv6、Docker 直连
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; --- 1. 基础与网络通用设置 (统一端口、彻底关闭 IPv6) ---
mixed_port=7890
port=7890
socks_port=7891
allow_lan=true
ipv6=false
log_level=info

; --- 2. 彻底修复 TLS 指纹（global-client-fingerprint）导致的内核闪退 ---
global-client-fingerprint=null

; --- 3. DNS 模块注入 (针对旁路由环境，注入极速 Fake-IP 模式) ---
dns_enable=true
dns_ipv6=false
dns_enhanced_mode=fake-ip
dns_fake_ip_range=198.18.0.1/16
; 排除列表：确保飞牛 NAS 本地服务、局域网设备、电视投屏（DLNA/AirPlay）绝不走 Fake-IP
dns_fake_ip_filter=*.lan,*.local,localhost,*.fnas,+.msftconnecttest.com,+.msftncsi.com
dns_default_nameserver=223.5.5.5,119.29.29.29
dns_nameserver=https://dns.alidns.com/dns-query,https://doh.pub/dns-query
dns_fallback=https://dns.google/dns-query,https://1.1.1.1/dns-query

; --- 4. 节点清洗 (排除无用节点和宣传广告) ---
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ==========================================================
; 5) 规则定义 (Rules) - 严格顺序：直连 > 分流 > 兜底
; ==========================================================

; --- 1. 局域网直连与旁路由穿透 (飞牛 NAS 本地高码率电影秒连，不卡顿) ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,lan,no-resolve
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve  ; 注入 Docker 容器默认网段
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 2. 核心视频与海外电视分流 ---
ruleset=🎬 视频与电视,[]DOMAIN-SUFFIX,886776.com
ruleset=🎬 视频与电视,[]DOMAIN-SUFFIX,886777.com
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,littlecloud
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,cloudtv
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,youtube
ruleset=🎬 视频与电视,[]DOMAIN-KEYWORD,googlevideo
ruleset=🤖 ChatGPT,[]DOMAIN-KEYWORD,openai

; --- 3. 最终兜底 ---
ruleset=🚀 节点选择,[]GEOSITE,gfw
ruleset=🚀 节点选择,[]FINAL

; ==========================================================
; 6) 策略组定义 (精简无国界版，安全树状嵌套，防止 Loop)
; ==========================================================

; --- 【顶层总控制组】 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT

; --- 【应用分流组】 ---
custom_proxy_group=🎬 视频与电视`select`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🤖 ChatGPT`select`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT

; --- 【物理节点过滤与自动测速】 (精准匹配，绝不把策略组塞进节点列表) ---
custom_proxy_group=🧭 手动选择`select`^(?!.*(🚀|🎬|🤖|♻️|🧭|DIRECT|REJECT)).*
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*(🚀|🎬|🤖|♻️|🧭|DIRECT|REJECT)).*`https://cp.cloudflare.com/generate_204`300,,50
