[custom]
; ==========================================================
; 2026-06-08 定制版：基于 Online_Mini_MultiMode 电视盒子及软路由优化
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; 节点清洗：剔除冗余和垃圾广告
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ==========================================================
; 1) 规则定义 (Ruleset) - 严格分流
; ==========================================================

; --- 拦截流媒体 UDP (防止电视盒子播放 4K 时频繁卡顿) ---
ruleset=🛑 全球拦截,[]DOMAIN-KEYWORD,youtube,udp
ruleset=🛑 全球拦截,[]DOMAIN-KEYWORD,googlevideo,udp

; --- 电视盒子专属流媒体补丁 ---
ruleset=📺 海外电视,[]DOMAIN-SUFFIX,886776.com
ruleset=📺 海外电视,[]DOMAIN-SUFFIX,886777.com
ruleset=📺 海外电视,[]DOMAIN-KEYWORD,littlecloud
ruleset=📺 海外电视,[]DOMAIN-KEYWORD,cloudtv

; --- 基础直连与拦截 (ACL4SSR 在线规则) ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list

; --- 核心流媒体分流 ---
ruleset=📺 海外电视,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

; --- 国内直连补丁 ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,LAN,no-resolve
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

; --- 兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 策略组定义 (Proxy Groups) - 完美嵌套不报错
; ==========================================================

; 【顶级总开关】🚀 节点选择：在这里你可以一键控制所有选项，包含你要求的应用子组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🧭 手动选择`[]🔯 故障转移`[]📺 海外电视`[]🎯 全球直连`[]DIRECT`[]🇭🇰 HK`[]🇹🇼 TW`[]🇺🇸 US

; 【盒子专属组】专为小云电视盒子等打造，首选台湾和香港优选，如果节点挂了会自动切换到物理节点池
custom_proxy_group=📺 海外电视`select`[]🇹🇼 TW`[]🇭🇰 HK`[]物理节点池`[]♻️ 自动选择`[]🚀 节点选择`[]DIRECT

; 【中层功能组】
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择

; 【底层物理节点池】纯节点容器，不向上引用主组，物理破除 Loop 循环报错
custom_proxy_group=物理节点池`select`[]♻️ 自动选择`[]🧭 手动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US

; ==========================================================
; 3) 自动测速与国家分组 (统一 HTTPS 测速地址)
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`https://cp.cloudflare.com/generate_204`180
custom_proxy_group=🔮 负载均衡`load-balance`.*`https://cp.cloudflare.com/generate_204`180

; 优选 IP 正则筛选
custom_proxy_group=🇭🇰 HK`url-test`(?i)(🇭🇰|香港|HK|HongKong)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇹🇼 TW`url-test`(?i)(🇹🇼|台湾|TW|Taiwan|Taipei|Hinet)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 JP`url-test`(?i)(🇯🇵|日本|JP|Japan|Tokyo|Osaka)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SG`url-test`(?i)(🇸🇬|新加坡|SG|Singapore)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 US`url-test`(?i)(🇺🇸|美国|US|United States|America)`https://cp.cloudflare.com/generate_204`300,,50