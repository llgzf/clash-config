[custom]
; ==========================================================
; 方案 B 增强版：针对 R5-6600H 高性能路由及机顶盒优化
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场冗余节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================

; --- 强制屏蔽 QUIC (针对 YouTube/电视盒，解决高画质卡顿) ---
ruleset=REJECT,[]GEOSITE,youtube,udp

; --- 小云电视 / 海外电视流媒体 (Little Cloud) 专项 ---
ruleset=📺 海外电视,[]DOMAIN-SUFFIX,886776.com
ruleset=📺 海外电视,[]DOMAIN-SUFFIX,886777.com
ruleset=📺 海外电视,[]DOMAIN-KEYWORD,littlecloud
ruleset=📺 海外电视,[]DOMAIN-KEYWORD,cloudtv

; --- 🟥 Adobe (原有规则) ---
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 私网直连 (保护 192.168.8.x Docker 通信) ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 核心应用 ---
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=📨 Telegram,[]GEOSITE,telegram

; --- GFW 兜底 ---
ruleset=🚀 手动选择,[]GEOSITE,gfw

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 策略组定制
; ==========================================================

; 【新增】海外电视专用组：首选台湾、香港低延迟节点
custom_proxy_group=📺 海外电视`select`[]🇹🇼 TW`[]🇭🇰 HK`[]♻️ 自动选择`[]🧭 手动选择`[]🌐 Default

; 【原有应用组保持方案 B 风格】
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🎥 Netflix`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 US`[]🇸🇬 SG`[]🇯🇵 JP`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🧠 AI`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=📨 Telegram`select`[]🇸🇬 SG`[]🇭🇰 HK`[]🇯🇵 JP`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🔎 Google`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]🧭 手动选择`[]🌐 Default

; 基础逻辑组
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🌐 Default`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]♻️ 自动选择`[]🧊 冷门节点`[]🧭 手动选择`[]🚀 手动选择

; ==========================================================
; 3) 测速组优化 (兼容优选节点)
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 针对优选 IP 脚本的名称正则
custom_proxy_group=🇭🇰 HK`url-test`(?i)(🇭🇰|香港|HK|HongKong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 TW`url-test`(?i)(🇹🇼|台湾|TW|Taiwan|Taipei|Hinet)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 JP`url-test`(?i)(🇯🇵|日本|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SG`url-test`(?i)(🇸🇬|新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 US`url-test`(?i)(🇺🇸|美国|US|United States|America)`http://www.gstatic.com/generate_204`300,,50

; 冷门节点池
custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(🇭🇰|香港|HK|🇯🇵|日本|JP|🇹🇼|台湾|TW|🇸🇬|新加坡|SG|🇺🇸|美国|US)).*
