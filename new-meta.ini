[custom]
; ==========================================================
; 2026-05-08 最终界面优化版：解决包含关系与循环引用
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; 节点清洗
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ==========================================================
; 1) 规则定义 (Rules)
; ==========================================================

; 屏蔽 YouTube UDP
ruleset=REJECT,[]DOMAIN-KEYWORD,youtube,udp
ruleset=REJECT,[]DOMAIN-KEYWORD,googlevideo,udp

; 核心分流 - 这些组将出现在您的界面上方
ruleset=📺 海外电视,[]DOMAIN-SUFFIX,886776.com
ruleset=📺 海外电视,[]DOMAIN-SUFFIX,886777.com
ruleset=🎬 YouTube,[]DOMAIN-KEYWORD,youtube
ruleset=🤖 ChatGPT,[]DOMAIN-KEYWORD,openai
ruleset=🎥 Netflix,[]DOMAIN-KEYWORD,netflix

; 基础直连
ruleset=DIRECT,[]GEOIP,lan,no-resolve
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; 兜底：指向最底层的节点池
ruleset=🚀 节点选择,[]DOMAIN-KEYWORD,google
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 策略组定义 (解决您要求的“包含”显示问题)
; ==========================================================

; 【应用分流组】这些是您在界面上最常用的切换开关
custom_proxy_group=📺 海外电视`select`[]🇹🇼 TW`[]🇭🇰 HK`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 US`[]🇸🇬 SG`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🚀 节点选择`[]♻️ 自动选择

; 【主组】🚀 节点选择 (这是所有物理节点的总入口)
; 这里包含了您要求的手动、自动、以及各个国家的筛选组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🧭 手动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]DIRECT

; 【展示组】如果您希望有一个组包含所有东西（仅做显示参考，不建议用于分流以免死循环）
custom_proxy_group=🌐 策略总览`select`[]🚀 节点选择`[]🎬 YouTube`[]📺 海外电视`[]🤖 ChatGPT`[]🐟 漏网之鱼

; 基础逻辑组
custom_proxy_group=🌐 Default`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🌐 Default`[]DIRECT

; ==========================================================
; 3) 节点筛选 (物理节点池)
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50

custom_proxy_group=🇭🇰 HK`url-test`(?i)(🇭🇰|香港|HK|HongKong)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇹🇼 TW`url-test`(?i)(🇹🇼|台湾|TW|Taiwan|Taipei|Hinet)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 JP`url-test`(?i)(🇯🇵|日本|JP|Japan|Tokyo|Osaka)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SG`url-test`(?i)(🇸🇬|新加坡|SG|Singapore)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 US`url-test`(?i)(🇺🇸|美国|US|United States|America)`https://cp.cloudflare.com/generate_204`300,,50
